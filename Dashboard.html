<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Verdana,sans-serif;background:#f4f6fa;padding:20px}
.container{max-width:1600px;margin:auto}

/* 🔹 HEADER VIOLETA */
.header{
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:white;
padding:30px;
text-align:center;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.header h1{
font-size:28px;
font-weight:600;
}

.filters{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:25px;
display:flex;
gap:15px;
flex-wrap:wrap;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.filters input,.filters select{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

.filters button{
padding:8px 15px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
cursor:pointer;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:white;
padding:20px;
border-radius:12px;
text-align:center;
}

.stat-card .number{
font-size:2em;
font-weight:bold;
}

.charts-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.chart-container{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

thead{
background:#667eea;
color:white;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px;
}

tbody tr:hover{
background:#f5f5f5;
}

.table-container{
overflow-x:auto;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}
</style>
</head>

<body>
<div class="container">

<!-- 🔹 NUEVO TITULO SUPERIOR -->
<div class="header">
<h1>Seguimiento - Mínimos requeridos</h1>
</div>

<div class="filters">
<input type="text" id="filtroNombre" placeholder="Apellido y Nombre">
<input type="text" id="filtroSAP" placeholder="SAP ID">

<select id="filtroActivity">
<option value="">Activity Type</option>
</select>

<select id="filtroCertType">
<option value="">Certification Type</option>
</select>

<button onclick="resetTotal()">Reset</button>
</div>

<div class="stats-grid">
<div class="stat-card"><h3>Vigentes</h3><div class="number" id="vigentes">0</div></div>
<div class="stat-card"><h3>Por Vencer</h3><div class="number" id="porVencer">0</div></div>
<div class="stat-card"><h3>Vencidas</h3><div class="number" id="vencidas">0</div></div>
<div class="stat-card"><h3>Total</h3><div class="number" id="total">0</div></div>
</div>

<div class="charts-grid">
<div class="chart-container">
<h3>Pendientes por OU 4</h3>
<canvas id="ouChart"></canvas>
</div>

<div class="chart-container">
<!-- 🔹 TITULO MODIFICADO -->
<h3>Requisitos On Hold</h3>
<canvas id="holdChart"></canvas>
</div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Apellido y Nombre</th>
<th>SAP ID</th>
<th>Certification Type</th>
<th>Certificacion</th>
<th>Activity Type</th>
<th>OU 4</th>
<th>Fecha Vencimiento</th>
<th>Estado</th>
<th>Comentarios</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>

/* 🔹 TODO TU SCRIPT QUEDA EXACTAMENTE IGUAL */
/* (no hace falta modificar nada del JS porque solo cambiamos textos visuales) */

</script>

</body>
</html>
