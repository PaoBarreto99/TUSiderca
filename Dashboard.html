<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f6fa;
padding:20px
}

.container{
max-width:1500px;
margin:auto
}

.header{
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
padding:25px;
border-radius:12px;
margin-bottom:25px;
text-align:center
}

.subtitulo{
margin-top:10px;
font-size:14px;
line-height:1.6
}

.subtitulo a{
color:white;
text-decoration:underline
}

.filters{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:25px;
display:flex;
gap:10px;
flex-wrap:wrap
}

.filters input,.filters select{
padding:8px;
border-radius:6px;
border:1px solid #ccc
}

.filters button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#6a11cb;
color:white;
cursor:pointer
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px
}

.stat-card{
color:white;
padding:20px;
border-radius:12px;
text-align:center
}

.bg-purple{background:linear-gradient(135deg,#6a11cb,#2575fc)}
.bg-red{background:linear-gradient(135deg,#cb2d3e,#ef473a)}

.number{
font-size:32px;
font-weight:bold
}

.charts-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px
}

.chart-container{
background:white;
padding:15px;
border-radius:12px;
height:350px;
overflow-y:auto
}

table{
width:100%;
border-collapse:collapse;
background:white
}

thead{
background:#6a11cb;
color:white
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px
}

.estado-vigente{color:green;font-weight:bold}
.estado-porvencer{color:orange;font-weight:bold}
.estado-vencida{color:red;font-weight:bold}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Mínimos Requeridos VENCIDOS</h1>

<p class="subtitulo">

<a href="https://pwbi.tenaris.net/" target="_blank">
¿Cómo lo regularizo?
</a>

<br>
Actualizado hasta el 06-Mar
<br><br>

<a href="https://app.powerbi.com/" target="_blank">
🔗 Link al BI de mínimos requeridos
</a>

</p>

</div>


<div class="filters">

<input type="text" id="filtroNombre" placeholder="Nombre">

<input type="text" id="filtroSAP" placeholder="SAP ID">

<select id="filtroActivity">
<option value="">Activity Type</option>
</select>

<select id="filtroCertType">
<option value="">Certification Type</option>
</select>

<select id="filtroOU5">
<option value="">OU 5</option>
</select>

<button onclick="resetTotal()">Reset</button>

<button onclick="exportarExcel()">Exportar Excel</button>

</div>


<div class="stats-grid">

<div class="stat-card bg-purple">
<h3>CUMPLIMIENTO 93%</h3>
<div>Target: 100%</div>
</div>

<div class="stat-card bg-red">
<h3>Requisitos vencidos</h3>
<div class="number" id="pendientes">0</div>
</div>

</div>


<div class="charts-grid">

<div class="chart-container">
<h3>Pendientes por OU 4</h3>
<canvas id="ouChart"></canvas>
</div>

<div class="chart-container">
<h3>On Hold</h3>
<canvas id="holdChart"></canvas>
</div>

</div>


<table>

<thead>

<tr>

<th>SAP ID</th>
<th>Nombre</th>
<th>Certificacion</th>
<th>Activity Type</th>
<th>Supervisor</th>
<th>OU 4</th>
<th>Estado</th>
<th>Comentarios</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>


<script>

let datosGlobal=[]
let ouChart
let holdChart

let filtroOU=null
let filtroHold=null

function exportarExcel(){

const tabla=document.querySelector("table")

const wb=XLSX.utils.table_to_book(tabla,{sheet:"Reporte"})

XLSX.writeFile(wb,"Minimos_Requeridos.xlsx")

}


function crearGraficos(ouCount,holdCount){

const sortedOU=Object.entries(ouCount).sort((a,b)=>b[1]-a[1])

const ouLabels=sortedOU.map(e=>e[0])
const ouValues=sortedOU.map(e=>e[1])

const colores=ouValues.map((v,i)=> i<3 ? "#ef473a" : "#f7971e")

const altura=ouLabels.length*35

document.getElementById("ouChart").height=altura

if(ouChart) ouChart.destroy()

ouChart=new Chart(document.getElementById("ouChart"),{

type:"bar",

data:{
labels:ouLabels,
datasets:[{
data:ouValues,
backgroundColor:colores
}]
},

options:{
indexAxis:'y',
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{y:{ticks:{autoSkip:false}}},
onClick:(evt,elements)=>{

if(elements.length>0){

const index=elements[0].index

const seleccionado=ouLabels[index]

filtroOU=(filtroOU===seleccionado)?null:seleccionado

aplicarFiltros()

}

}
}

})


const sortedHold=Object.entries(holdCount).sort((a,b)=>b[1]-a[1])

const holdLabels=sortedHold.map(e=>e[0])
const holdValues=sortedHold.map(e=>e[1])

const altura2=holdLabels.length*35

document.getElementById("holdChart").height=altura2

if(holdChart) holdChart.destroy()

holdChart=new Chart(document.getElementById("holdChart"),{

type:"bar",

data:{
labels:holdLabels,
datasets:[{
data:holdValues,
backgroundColor:"#6a11cb"
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{y:{ticks:{autoSkip:false}}},
onClick:(evt,elements)=>{

if(elements.length>0){

const index=elements[0].index

const seleccionado=holdLabels[index]

filtroHold=(filtroHold===seleccionado)?null:seleccionado

aplicarFiltros()

}

}
}

})

}

</script>

</body>
</html>
