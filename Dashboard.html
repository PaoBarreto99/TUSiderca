<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f6fa;
padding:20px
}

.container{
max-width:1500px;
margin:auto
}

.header{
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
padding:25px;
border-radius:12px;
margin-bottom:25px;
text-align:center
}

.subtitulo{
margin-top:10px;
font-size:14px;
line-height:1.6
}

.subtitulo a{
color:white;
text-decoration:underline
}

.filters{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:25px;
display:flex;
gap:10px;
flex-wrap:wrap
}

.filters input,.filters select{
padding:8px;
border-radius:8px;
border:1px solid #ccc
}

.filters button{
padding:8px 15px;
border:none;
border-radius:8px;
background:#6a11cb;
color:white;
cursor:pointer
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px
}

.stat-card{
color:white;
padding:20px;
border-radius:12px;
text-align:center
}

.bg-purple{background:linear-gradient(135deg,#6a11cb,#2575fc)}
.bg-red{background:linear-gradient(135deg,#cb2d3e,#ef473a)}

.number{
font-size:2em;
font-weight:bold
}

.subtext{
font-size:13px;
margin-top:5px
}

.charts-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px
}

.chart-container{
background:white;
padding:15px;
border-radius:12px;
height:250px
}

.chart-container canvas{
height:200px !important
}

table{
width:100%;
border-collapse:collapse;
background:white
}

thead{
background:#6a11cb;
color:white
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px
}

.estado-vigente{color:green;font-weight:bold}
.estado-vencida{color:red;font-weight:bold}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Mínimos Requeridos VENCIDOS</h1>

<p class="subtitulo">
<a href="#">¿Cómo lo regularizo?</a>
<br>
Actualizado hasta el 06-Mar
</p>

</div>

<div class="filters">

<input id="fNombre" placeholder="Nombre">

<input id="fSAP" placeholder="SAP ID">

<select id="fActivity">
<option value="">Activity Type</option>
</select>

<select id="fSupervisor">
<option value="">Supervisor</option>
</select>

<select id="fOU5">
<option value="">OU 5</option>
</select>

<button onclick="resetFiltros()">Reset</button>

<button onclick="exportarExcel()">Exportar Excel</button>

</div>

<div class="stats-grid">

<div class="stat-card bg-purple">
<h3>CUMPLIMIENTO 93%</h3>
<div class="subtext">Target: 100%</div>
</div>

<div class="stat-card bg-red">
<h3>Requisitos vencidos</h3>
<div class="number" id="pendientes">0</div>
</div>

</div>

<div class="charts-grid">

<div class="chart-container">
<h3>Pendientes por OU 4</h3>
<canvas id="ouChart"></canvas>
</div>

<div class="chart-container">
<h3>On Hold</h3>
<canvas id="holdChart"></canvas>
</div>

</div>

<table id="tablaDatos">

<thead>
<tr>
<th>SAP ID</th>
<th>Nombre y Apellido</th>
<th>Certificación</th>
<th>Activity Type</th>
<th>Supervisor</th>
<th>OU 4</th>
<th>Estado</th>
<th>Comentarios</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

let datosGlobal=[]
let datosFiltrados=[]
let ouChart
let holdChart

function procesarCSV(csv){

Papa.parse(csv,{
header:true,
skipEmptyLines:true,
complete:function(results){

datosGlobal=results.data

cargarFiltros()

renderizar(datosGlobal)

}
})

}

function cargarFiltros(){

const actSet=new Set()
const supSet=new Set()
const ou5Set=new Set()

datosGlobal.forEach(d=>{
if(d["Activity Type"]) actSet.add(d["Activity Type"])
if(d.Supervisor) supSet.add(d.Supervisor)
if(d["OU 5"]) ou5Set.add(d["OU 5"])
})

actSet.forEach(a=>{
document.getElementById("fActivity").innerHTML+=`<option>${a}</option>`
})

supSet.forEach(s=>{
document.getElementById("fSupervisor").innerHTML+=`<option>${s}</option>`
})

ou5Set.forEach(o=>{
document.getElementById("fOU5").innerHTML+=`<option>${o}</option>`
})

}

function parseFecha(f){

if(!f) return null

const p=f.split("/")

return new Date(p[2],p[1]-1,p[0])

}

function estado(f){

const fecha=parseFecha(f)

if(!fecha) return "Vencida"

const hoy=new Date()
hoy.setHours(0,0,0,0)

if(fecha<hoy) return "Vencida"

return "Vigente"

}

function aplicarFiltros(){

const nombre=document.getElementById("fNombre").value.toLowerCase()
const sap=document.getElementById("fSAP").value
const act=document.getElementById("fActivity").value
const sup=document.getElementById("fSupervisor").value
const ou5=document.getElementById("fOU5").value

datosFiltrados=datosGlobal.filter(d=>{

return (!nombre || d.Nombre?.toLowerCase().includes(nombre))
&&(!sap || d["SAP ID"]?.includes(sap))
&&(!act || d["Activity Type"]===act)
&&(!sup || d.Supervisor===sup)
&&(!ou5 || d["OU 5"]===ou5)

})

renderizar(datosFiltrados)

}

function resetFiltros(){

document.querySelectorAll("input").forEach(e=>e.value="")
document.querySelectorAll("select").forEach(e=>e.value="")

renderizar(datosGlobal)

}

function exportarExcel(){

const tabla=document.getElementById("tablaDatos")

const wb=XLSX.utils.table_to_book(tabla,{sheet:"Reporte"})

XLSX.writeFile(wb,"Minimos_Requeridos.xlsx")

}

function renderizar(datos){

datosFiltrados=datos

let vencidas=0
let ouCount={}
let holdCount={}

const tbody=document.getElementById("tableBody")

tbody.innerHTML=""

datos.forEach(d=>{

const est=estado(d["Fecha_vencimiento"])

if(est==="Vencida"){

vencidas++

const ou=d["OU 4"]||"Sin OU"

ouCount[ou]=(ouCount[ou]||0)+1

}

if(d.Comentarios){

holdCount[d.Comentarios]=(holdCount[d.Comentarios]||0)+1

}

tbody.innerHTML+=`
<tr>
<td>${d["SAP ID"]||""}</td>
<td>${d.Nombre||""}</td>
<td>${d.Certificacion||""}</td>
<td>${d["Activity Type"]||""}</td>
<td>${d.Supervisor||""}</td>
<td>${d["OU 4"]||""}</td>
<td class="${est==="Vencida"?"estado-vencida":"estado-vigente"}">${est}</td>
<td>${d.Comentarios||""}</td>
</tr>
`

})

document.getElementById("pendientes").textContent=vencidas

crearGraficos(ouCount,holdCount)

}

function crearGraficos(ouCount,holdCount){

const sortedOU=Object.entries(ouCount).sort((a,b)=>b[1]-a[1])

const ouLabels=sortedOU.map(e=>e[0])
const ouValues=sortedOU.map(e=>e[1])

const colors=ouValues.map((v,i)=> i<3 ? "#ef473a" : "#f7971e")

if(ouChart) ouChart.destroy()

ouChart=new Chart(document.getElementById("ouChart"),{

type:"bar",

data:{
labels:ouLabels,
datasets:[{
data:ouValues,
backgroundColor:colors,
barThickness:12
}]
},

options:{
indexAxis:'y',
plugins:{legend:{display:false}},
scales:{y:{ticks:{autoSkip:false}}}
}

})

const sortedHold=Object.entries(holdCount).sort((a,b)=>b[1]-a[1])

const holdLabels=sortedHold.map(e=>e[0])
const holdValues=sortedHold.map(e=>e[1])

if(holdChart) holdChart.destroy()

holdChart=new Chart(document.getElementById("holdChart"),{

type:"bar",

data:{
labels:holdLabels,
datasets:[{
data:holdValues,
backgroundColor:"#6a11cb"
}]
},

options:{
plugins:{legend:{display:false}}
}

})

}

document.addEventListener("input",aplicarFiltros)
document.addEventListener("change",aplicarFiltros)

window.onload=function(){

if(window.csvData){

procesarCSV(window.csvData)

}

}

</script>

</body>
</html>
