<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Certificaciones</title>

    <!-- ✅ CSS de DataTables y algo de estilo básico -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            padding: 1.5rem;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 1rem;
        }

        .kpi-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .kpi-card {
            flex: 1 1 200px;
            background-color: #f5f5f5;
            border-radius: 8px;
            padding: 1rem 1.2rem;
        }

        .kpi-title {
            font-size: 0.9rem;
            color: #666;
        }

        .kpi-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .table-section {
            margin-top: 2rem;
        }

        #detalle-certificaciones_wrapper {
            margin-top: 1rem;
        }
    </style>

    <!-- ✅ jQuery y DataTables -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <!-- ✅ PapaParse para leer CSV desde la variable window.csvData -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Aquí, Streamlit inyectará:
         <script>window.csvData = `...csv...`;</script>
    -->
</head>
<body>
<div class="container">
    <h1>Dashboard de Certificaciones</h1>

    <!-- 🔹 KPIs arriba -->
    <div class="kpi-container">
        <div class="kpi-card">
            <div class="kpi-title">Total de certificaciones</div>
            <div class="kpi-value" id="kpi-total-certificaciones">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">Certificaciones vigentes</div>
            <div class="kpi-value" id="kpi-vigentes">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">Certificaciones vencidas</div>
            <div class="kpi-value" id="kpi-vencidas">-</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-title">Vencen en próximos 30 días</div>
            <div class="kpi-value" id="kpi-proximo-vencer">-</div>
        </div>
    </div>

    <!-- 🔹 Detalle de certificaciones -->
    <div class="table-section">
        <h2>Detalle de certificaciones</h2>
