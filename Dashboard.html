<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin: 20px; }

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.chart-container {
  height: 350px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  font-size: 13px;
  text-align: left;
}

th { background-color: #f2f2f2; }

</style>
</head>
<body>

<div class="grid">
  <div class="chart-container">
    <h3>Pendientes por OU 4</h3>
    <canvas id="ouChart"></canvas>
  </div>

  <div class="chart-container">
    <h3>Certificaciones On Hold</h3>
    <canvas id="holdChart"></canvas>
  </div>
</div>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>SAP ID</th>
<th>Certificacion</th>
<th>Certification Type</th>
<th>Activity Type</th>
<th>OU 4</th>
<th>Fecha Vencimiento</th>
<th>Comentarios</th>
</tr>
</thead>
<tbody id="tablaBody"></tbody>
</table>

<script>

const datos = window.csvData
  .trim()
  .split("\n")
  .map(r => r.split(","));

const headers = datos[0];
const filas = datos.slice(1).map(row => {
  let obj = {};
  headers.forEach((h,i) => obj[h] = row[i]);
  return obj;
});

let ouPendientes = {};
let holdCounts = {};

filas.forEach(d => {

  const estado = d["Estado"];
  const ou = d["OU 4"] || "Sin OU";

  if(estado === "Por Vencer" || estado === "Vencida"){
    ouPendientes[ou] = (ouPendientes[ou] || 0) + 1;
  }

  if(estado === "On Hold"){
    holdCounts[d["Certificacion"]] =
      (holdCounts[d["Certificacion"]] || 0) + 1;
  }

  document.getElementById("tablaBody").innerHTML += `
    <tr>
      <td>${d["Nombre"]}</td>
      <td>${d["SAP ID"]}</td>
      <td>${d["Certificacion"]}</td>
      <td>${d["Certification Type"]}</td>
      <td>${d["Activity Type"]}</td>
      <td>${d["OU 4"]}</td>
      <td>${d["Fecha_Vencimiento"]}</td>
      <td>${d["Comentarios"]}</td>
    </tr>
  `;
});

function ordenar(obj){
  return Object.fromEntries(
    Object.entries(obj)
      .sort((a,b)=>b[1]-a[1])
  );
}

ouPendientes = ordenar(ouPendientes);
holdCounts = ordenar(holdCounts);

new Chart(document.getElementById("ouChart"), {
  type: "bar",
  data: {
    labels: Object.keys(ouPendientes),
    datasets: [{
      label: "Pendientes",
      data: Object.values(ouPendientes)
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true
  }
});

new Chart(document.getElementById("holdChart"), {
  type: "bar",
  data: {
    labels: Object.keys(holdCounts),
    datasets: [{
      label: "On Hold",
      data: Object.values(holdCounts)
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true
  }
});

</script>

</body>
</html>
