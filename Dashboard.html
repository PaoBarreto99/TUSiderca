<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f6fa;
padding:20px
}

.container{
max-width:1500px;
margin:auto
}

.header{
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
padding:25px;
border-radius:12px;
margin-bottom:25px;
text-align:center;
}

.subtitulo{
margin-top:10px;
font-size:14px;
opacity:0.95;
line-height:1.6;
}

.subtitulo a{
color:#ffffff;
text-decoration:underline;
font-weight:500;
}

.filters{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:25px;
display:flex;
gap:15px;
flex-wrap:wrap
}

.filters input,.filters select{
padding:8px;
border-radius:8px;
border:1px solid #ccc
}

.filters button{
padding:8px 15px;
border:none;
border-radius:8px;
background:#6a11cb;
color:white;
cursor:pointer
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px
}

.stat-card{
color:white;
padding:20px;
border-radius:12px;
text-align:center
}

.stat-card .number{
font-size:2em;
font-weight:bold
}

.subtext{
font-size:13px;
margin-top:6px;
opacity:0.9
}

.bg-purple{
background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.bg-red{
background:linear-gradient(135deg,#cb2d3e,#ef473a);
}

.charts-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px
}

.chart-container{
background:white;
padding:15px;
border-radius:12px;
height:225px
}

table{
width:100%;
border-collapse:collapse;
background:white
}

thead{
background:#6a11cb;
color:white
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px
}

.estado-vigente{color:green;font-weight:bold}
.estado-porvencer{color:orange;font-weight:bold}
.estado-vencida{color:red;font-weight:bold}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Mínimos Requeridos VENCIDOS</h1>

<p class="subtitulo">

<a href="https://pwbi.tenaris.net/reports/powerbi/Business%20Analytics%20Reports/Regions/Southern%20Cone/TU%20Argentina/INFO%20TU" target="_blank">
¿Cómo lo regularizo?
</a>

<br>
Actualizado hasta el 06-Mar
<br><br>

<a href="https://app.powerbi.com/groups/3f2e9d83-3263-4d60-9f8b-6c867912acc0/reports/f8180ab6-3019-45e8-9f6f-b40aa6ca4e91/52c739b0d08235bbec69?ctid=a054342c-6f8c-4378-ad61-a8ad00f2b736&experience=power-bi&chromeless=true" target="_blank">
🔗 Link al BI de mínimos requeridos
</a>

</p>

</div>

<div class="charts-grid">

<div class="chart-container">
<h3>Pendientes por OU 4</h3>
<canvas id="ouChart"></canvas>
</div>

<div class="chart-container">
<h3>On Hold</h3>
<canvas id="holdChart"></canvas>
</div>

</div>

<table>

<thead>
<tr>
<th>Nombre</th>
<th>SAP ID</th>
<th>Certification Type</th>
<th>Certificacion</th>
<th>Activity Type</th>
<th>OU 4</th>
<th>Estado</th>
<th>Comentarios</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

let datosGlobal=[]
let ouChart
let holdChart

function calcularEstado(fecha){

if(!fecha) return "Vencida"

const hoy=new Date()

const f=new Date(fecha)

const diff=(f-hoy)/(1000*60*60*24)

if(diff<0) return "Vencida"

if(diff<=90) return "Por Vencer"

return "Vigente"

}

function renderizar(datos){

let ven=0
let ouCount={}
let holdCount={}

const tbody=document.getElementById("tableBody")

tbody.innerHTML=""

datos.forEach(d=>{

const estado=calcularEstado(d["Fecha_Vencimiento"])

if(estado==="Vencida") ven++

if(estado!=="Vigente"){

const ou=d["OU 4"]||"Sin OU"

ouCount[ou]=(ouCount[ou]||0)+1

}

if(d.Comentarios){

holdCount[d.Comentarios]=(holdCount[d.Comentarios]||0)+1

}

let clase=""

if(estado==="Vigente")clase="estado-vigente"
if(estado==="Por Vencer")clase="estado-porvencer"
if(estado==="Vencida")clase="estado-vencida"

tbody.innerHTML+=`

<tr>

<td>${d.Nombre||""}</td>

<td>${d["SAP ID"]||""}</td>

<td>${d["Certification Type"]||""}</td>

<td>${d.Certificacion||""}</td>

<td>${d["Activity Type"]||""}</td>

<td>${d["OU 4"]||""}</td>

<td class="${clase}">${estado}</td>

<td>${d.Comentarios||""}</td>

</tr>

`

})

crearGraficos(ouCount,holdCount)

}

function crearGraficos(ouCount,holdCount){

const sortedOU=Object.entries(ouCount).sort((a,b)=>b[1]-a[1])

const labels=sortedOU.map(e=>e[0])
const values=sortedOU.map(e=>e[1])

const colores=values.map((v,i)=>i<3?"#ef473a":"#f7971e")

if(ouChart) ouChart.destroy()

ouChart=new Chart(document.getElementById("ouChart"),{

type:"bar",

data:{
labels:labels,
datasets:[{
data:values,
backgroundColor:colores
}]
},

options:{
indexAxis:'y',
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}}
}

})

}

window.onload=function(){

if(window.csvData){

Papa.parse(window.csvData,{

header:true,

skipEmptyLines:true,

complete:function(results){

datosGlobal=results.data

renderizar(datosGlobal)

}

})

}

}

</script>

</body>
</html>
