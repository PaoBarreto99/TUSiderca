<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
}

.header{
    background:#1f2937;
    color:white;
    padding:20px;
}

.header h1{
    margin:0;
}

.subtitulo{
    font-size:14px;
    margin-top:5px;
}

.subtitulo a{
    color:#93c5fd;
    text-decoration:none;
    margin-right:15px;
}

.cards{
    display:flex;
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    flex:1;
}

.card h2{
    margin:0;
    font-size:28px;
}

.card p{
    margin:5px 0 0 0;
    color:#555;
}

.graficos{
    display:flex;
    gap:20px;
    padding:20px;
}

canvas{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="header">
    <h1>Dashboard Certificaciones</h1>
    <div class="subtitulo">
        <a href="https://tuslink1.com" target="_blank">Link 1</a>
        <a href="https://tuslink2.com" target="_blank">Link 2</a>
    </div>
</div>

<div class="cards">
    <div class="card">
        <h2>CUMPLIMIENTO 93%</h2>
        <p>Target 100%</p>
    </div>

    <div class="card">
        <h2 id="requisitosVencidos">0</h2>
        <p>Requisitos vencidos</p>
    </div>
</div>

<div class="graficos">
    <canvas id="graficoOU"></canvas>
    <canvas id="graficoEstado"></canvas>
</div>

<script>

let dataOriginal = [];
let filtroOU = null;
let filtroEstado = null;
let chartOU;
let chartEstado;

function renderizar(data){

    let dataFiltrada = data.filter(d=>{
        let ok = true;
        if(filtroOU) ok = ok && d["OU 4"] === filtroOU;
        if(filtroEstado) ok = ok && d["Estado"] === filtroEstado;
        return ok;
    });

    // 🔢 Contar vencidos
    let vencidos = dataFiltrada.filter(d=>d["Estado"]==="Vencido").length;
    document.getElementById("requisitosVencidos").textContent = vencidos;

    // 📊 Conteo por OU
    let ouCount = {};
    dataFiltrada.forEach(d=>{
        let ou = d["OU 4"];
        if(ou){
            ouCount[ou] = (ouCount[ou] || 0) + 1;
        }
    });

    // 📊 Conteo por Estado
    let estadoCount = {};
    dataFiltrada.forEach(d=>{
        let est = d["Estado"];
        if(est){
            estadoCount[est] = (estadoCount[est] || 0) + 1;
        }
    });

    // 🔁 Destruir gráficos anteriores
    if(chartOU) chartOU.destroy();
    if(chartEstado) chartEstado.destroy();

    // 📊 Gráfico OU
    chartOU = new Chart(document.getElementById("graficoOU"),{
        type:"bar",
        data:{
            labels:Object.keys(ouCount),
            datasets:[{
                label:"Cantidad",
                data:Object.values(ouCount)
            }]
        },
        options:{
            onClick:(evt,elements)=>{
                if(elements.length>0){
                    let index = elements[0].index;
                    let label = chartOU.data.labels[index];

                    if(filtroOU === label){
                        filtroOU = null;
                    }else{
                        filtroOU = label;
                    }

                    renderizar(dataOriginal);
                }
            }
        }
    });

    // 📊 Gráfico Estado
    chartEstado = new Chart(document.getElementById("graficoEstado"),{
        type:"pie",
        data:{
            labels:Object.keys(estadoCount),
            datasets:[{
                data:Object.values(estadoCount)
            }]
        },
        options:{
            onClick:(evt,elements)=>{
                if(elements.length>0){
                    let index = elements[0].index;
                    let label = chartEstado.data.labels[index];

                    if(filtroEstado === label){
                        filtroEstado = null;
                    }else{
                        filtroEstado = label;
                    }

                    renderizar(dataOriginal);
                }
            }
        }
    });

}

// 🚀 Cargar datos desde Streamlit
window.addEventListener("load", function(){

    if(typeof window.jsonData !== "undefined" && window.jsonData){
        dataOriginal = window.jsonData;
        renderizar(dataOriginal);
    }else{
        console.error("No se recibió jsonData desde Streamlit");
    }

});

</script>

</body>
</html>
