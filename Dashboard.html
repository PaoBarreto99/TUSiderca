<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f6f9;
}

.container{
width:100%;
padding:20px;
box-sizing:border-box;
}

.cards{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat-card{
flex:1;
color:white;
padding:20px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.bg-blue{background:linear-gradient(135deg,#1e3c72,#2a5298);}
.bg-red{background:linear-gradient(135deg,#cb2d3e,#ef473a);}
.bg-purple{background:linear-gradient(135deg,#6a11cb,#2575fc);}

.card-title{
font-size:18px;
}

.card-value{
font-size:40px;
margin-top:10px;
}

.chart-container{
width:100%;
height:225px; /* 🔥 MITAD DE TAMAÑO */
margin-bottom:30px;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="container">

<div class="cards">
<div class="stat-card bg-blue">
<div class="card-title">CUMPLIMIENTO 93%</div>
<div style="font-size:14px;">Target 100%</div>
</div>

<div class="stat-card bg-red">
<div class="card-title">Requisitos vencidos</div>
<div class="card-value" id="vencidos">0</div>
</div>
</div>

<div class="chart-container">
<canvas id="ouChart"></canvas>
</div>

<div class="chart-container">
<canvas id="holdChart"></canvas>
</div>

</div>

<script>

let ouChart;
let holdChart;
let filtroOU = null;
let filtroHold = null;

const data = window.csvData;

function parseCSV(text){
const rows = text.trim().split("\n");
const headers = rows[0].split(",");
return rows.slice(1).map(row=>{
const values=row.split(",");
let obj={};
headers.forEach((h,i)=>obj[h]=values[i]);
return obj;
});
}

const df = parseCSV(data);

function aplicarFiltros(){
let filtrado = df;

if(filtroOU){
filtrado = filtrado.filter(d=>d.OU === filtroOU);
}

if(filtroHold){
filtrado = filtrado.filter(d=>d.Holding === filtroHold);
}

renderizar(filtrado);
}

function renderizar(data){

let vencidos = data.filter(d=>{
if(!d.Fecha_Vencimiento) return false;
return new Date(d.Fecha_Vencimiento) < new Date();
}).length;

document.getElementById("vencidos").innerText = vencidos;

let ouCount = {};
let holdCount = {};

data.forEach(d=>{
ouCount[d.OU] = (ouCount[d.OU]||0)+1;
holdCount[d.Holding] = (holdCount[d.Holding]||0)+1;
});

crearGraficos(ouCount,holdCount);
}

function crearGraficos(ouCount,holdCount){

const sortedOU=Object.entries(ouCount).sort((a,b)=>b[1]-a[1]);
const ouLabels=sortedOU.map(e=>e[0]);
const ouValues=sortedOU.map(e=>e[1]);

// 🔴 Top 3 rojo, 🟠 resto naranja
const coloresOU = ouValues.map((v,i)=> i < 3 ? "#ef473a" : "#f7971e");

if(ouChart) ouChart.destroy();
ouChart=new Chart(document.getElementById("ouChart"),{
type:"bar",
data:{
labels:ouLabels,
datasets:[{
data:ouValues,
backgroundColor:coloresOU
}]
},
options:{
indexAxis:'y',
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{
y:{
ticks:{autoSkip:false}
}
},
onClick:(evt,elements)=>{
if(elements.length>0){
const index=elements[0].index;
const seleccionado=ouLabels[index];
filtroOU = (filtroOU===seleccionado) ? null : seleccionado;
aplicarFiltros();
}
}
}
});

const sortedHold=Object.entries(holdCount).sort((a,b)=>b[1]-a[1]);
const holdLabels=sortedHold.map(e=>e[0]);
const holdValues=sortedHold.map(e=>e[1]);

if(holdChart) holdChart.destroy();
holdChart=new Chart(document.getElementById("holdChart"),{
type:"bar",
data:{
labels:holdLabels,
datasets:[{
data:holdValues,
backgroundColor:"#f7971e"
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
onClick:(evt,elements)=>{
if(elements.length>0){
const index=elements[0].index;
const seleccionado=holdLabels[index];
filtroHold = (filtroHold===seleccionado) ? null : seleccionado;
aplicarFiltros();
}
}
}
});
}

renderizar(df);

</script>

</body>
</html>
