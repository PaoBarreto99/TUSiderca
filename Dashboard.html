<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{font-family:Segoe UI;background:#f4f6fa;padding:20px}
.container{max-width:1500px;margin:auto}

.header{
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
padding:25px;
border-radius:12px;
margin-bottom:25px;
text-align:center;
}

.subtitulo{
margin-top:10px;
font-size:14px;
opacity:0.95;
line-height:1.6;
}

.subtitulo a{
color:#ffffff;
text-decoration:underline;
font-weight:500;
}

.filters{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:25px;
display:flex;
gap:15px;
flex-wrap:wrap
}

.filters input,.filters select{
padding:8px;
border-radius:8px;
border:1px solid #ccc
}

.filters button{
padding:8px 15px;
border:none;
border-radius:8px;
background:#6a11cb;
color:white;
cursor:pointer
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px
}

.stat-card{
color:white;
padding:20px;
border-radius:12px;
text-align:center
}

.stat-card .number{
font-size:2em;
font-weight:bold
}

.subtext{
font-size:13px;
margin-top:6px;
opacity:0.9
}

.bg-purple{background:linear-gradient(135deg,#6a11cb,#2575fc);}
.bg-red{background:linear-gradient(135deg,#cb2d3e,#ef473a);}

.charts-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px
}

.chart-container{
background:white;
padding:15px;
border-radius:12px;
height:225px;
}

table{
width:100%;
border-collapse:collapse;
background:white
}

thead{
background:#6a11cb;
color:white
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px
}

.estado-vigente{color:green;font-weight:bold}
.estado-porvencer{color:orange;font-weight:bold}
.estado-vencida{color:red;font-weight:bold}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>Mínimos Requeridos VENCIDOS</h1>

<p class="subtitulo">

<a href="https://pwbi.tenaris.net/reports/powerbi/Business%20Analytics%20Reports/Regions/Southern%20Cone/TU%20Argentina/INFO%20TU" target="_blank">
¿Cómo lo regularizo?
</a>

<br>
Actualizado hasta el 06-Mar
<br><br>

<a href="https://app.powerbi.com/groups/3f2e9d83-3263-4d60-9f8b-6c867912acc0/reports/f8180ab6-3019-45e8-9f6f-b40aa6ca4e91/52c739b0d08235bbec69" target="_blank">
🔗 Link al BI de mínimos requeridos
</a>

</p>
</div>


<div class="filters">

<input type="text" id="filtroNombre" placeholder="Nombre">
<input type="text" id="filtroSAP" placeholder="SAP ID">

<select id="filtroActivity"><option value="">Activity Type</option></select>
<select id="filtroCertType"><option value="">Certification Type</option></select>
<select id="filtroOU5"><option value="">OU 5</option></select>

<button onclick="resetTotal()">Reset</button>
<button onclick="exportarExcel()">Exportar Excel</button>

</div>


<div class="stats-grid">

<div class="stat-card bg-purple">
<h3>CUMPLIMIENTO 93%</h3>
<div class="subtext">Target: 100%</div>
</div>

<div class="stat-card bg-red">
<h3>Requisitos vencidos</h3>
<div class="number" id="pendientes">0</div>
</div>

</div>


<div class="charts-grid">

<div class="chart-container">
<h3>Pendientes por OU 4</h3>
<canvas id="ouChart"></canvas>
</div>

<div class="chart-container">
<h3>On Hold</h3>
<canvas id="holdChart"></canvas>
</div>

</div>


<table>

<thead>
<tr>

<th>SAP ID</th>
<th>Nombre</th>
<th>Certificacion</th>
<th>Activity Type</th>
<th>Supervisor</th>
<th>OU 4</th>
<th>Estado</th>
<th>Comentarios</th>

</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

let datosGlobal=[]
let ouChart
let holdChart
let filtroOU=null
let filtroHold=null


function exportarExcel(){

const tabla=document.querySelector("table")

const wb=XLSX.utils.table_to_book(tabla,{sheet:"Reporte"})

XLSX.writeFile(wb,"Minimos_Requeridos.xlsx")

}


function procesarCSV(csv){

csv=csv.replace(/^\uFEFF/,"")

Papa.parse(csv,{
header:true,
skipEmptyLines:true,

complete:function(results){

datosGlobal=results.data

cargarOpciones()

renderizar(datosGlobal)

}

})

}


function cargarOpciones(){

const actSet=new Set()
const certSet=new Set()
const ou5Set=new Set()

datosGlobal.forEach(d=>{

if(d["Activity Type"]) actSet.add(d["Activity Type"])
if(d["Certification Type"]) certSet.add(d["Certification Type"])
if(d["OU 5"]) ou5Set.add(d["OU 5"])

})

actSet.forEach(a=>{
document.getElementById("filtroActivity").innerHTML+=`<option>${a}</option>`
})

certSet.forEach(c=>{
document.getElementById("filtroCertType").innerHTML+=`<option>${c}</option>`
})

ou5Set.forEach(o=>{
document.getElementById("filtroOU5").innerHTML+=`<option>${o}</option>`
})

}


function parseFecha(fechaStr){

if(!fechaStr) return null

const partes=fechaStr.split("/")

if(partes.length!==3) return null

return new Date(partes[2],partes[0]-1,partes[1])

}


function calcularEstado(fechaStr){

const fecha=parseFecha(fechaStr)

if(!fecha) return "Vencida"

const hoy=new Date()

hoy.setHours(0,0,0,0)

const diff=(fecha-hoy)/(1000*60*60*24)

if(diff<0) return "Vencida"
if(diff<=90) return "Por Vencer"

return "Vigente"

}


function aplicarFiltros(){

let datos=datosGlobal

const nombre=document.getElementById("filtroNombre").value.toLowerCase()
const sap=document.getElementById("filtroSAP").value.toLowerCase()
const act=document.getElementById("filtroActivity").value
const cert=document.getElementById("filtroCertType").value
const ou5=document.getElementById("filtroOU5").value


datos=datos.filter(d=>{

return (!nombre||d.Nombre?.toLowerCase().includes(nombre))
&&(!sap||d["SAP ID"]?.toLowerCase().includes(sap))
&&(!act||d["Activity Type"]===act)
&&(!cert||d["Certification Type"]===cert)
&&(!ou5||d["OU 5"]===ou5)

})

if(filtroOU){datos=datos.filter(d=>d["OU 4"]===filtroOU)}
if(filtroHold){datos=datos.filter(d=>d.Comentarios===filtroHold)}

renderizar(datos)

}


function resetTotal(){

document.querySelectorAll("input,select").forEach(e=>e.value="")

filtroOU=null
filtroHold=null

renderizar(datosGlobal)

}


function renderizar(datos){

let ven=0
let ouCount={}
let holdCount={}

const tbody=document.getElementById("tableBody")

tbody.innerHTML=""

datos.forEach(d=>{

const estado=calcularEstado(d["Fecha_Vencimiento"])

if(estado==="Vencida") ven++

if(estado!=="Vigente"){

const ou=d["OU 4"]||"Sin OU"

ouCount[ou]=(ouCount[ou]||0)+1

}

if(d.Comentarios){

holdCount[d.Comentarios]=(holdCount[d.Comentarios]||0)+1

}

let clase=""

if(estado==="Vigente")clase="estado-vigente"
if(estado==="Por Vencer")clase="estado-porvencer"
if(estado==="Vencida")clase="estado-vencida"


tbody.innerHTML+=`

<tr>

<td>${d["SAP ID"]||""}</td>
<td>${d.Nombre||""}</td>
<td>${d.Certificacion||""}</td>
<td>${d["Activity Type"]||""}</td>
<td>${d.Supervisor||""}</td>
<td>${d["OU 4"]||""}</td>
<td class="${clase}">${estado}</td>
<td>${d.Comentarios||""}</td>

</tr>

`

})


document.getElementById("pendientes").textContent=ven

crearGraficos(ouCount,holdCount)

}


function crearGraficos(ouCount,holdCount){

const sortedOU=Object.entries(ouCount).sort((a,b)=>b[1]-a[1])

const ouLabels=sortedOU.map(e=>e[0])
const ouValues=sortedOU.map(e=>e[1])

const colores=ouValues.map((v,i)=> i<3 ? "#ef473a" : "#f7971e")

if(ouChart) ouChart.destroy()

ouChart=new Chart(document.getElementById("ouChart"),{

type:"bar",

data:{labels:ouLabels,datasets:[{data:ouValues,backgroundColor:colores}]},

options:{

indexAxis:'y',

plugins:{legend:{display:false}},

onClick:(evt,elements)=>{

if(elements.length>0){

const index=elements[0].index

const seleccionado=ouLabels[index]

filtroOU=(filtroOU===seleccionado)?null:seleccionado

aplicarFiltros()

}

}

}

})


const sortedHold=Object.entries(holdCount).sort((a,b)=>b[1]-a[1])

const holdLabels=sortedHold.map(e=>e[0])
const holdValues=sortedHold.map(e=>e[1])

if(holdChart) holdChart.destroy()

holdChart=new Chart(document.getElementById("holdChart"),{

type:"bar",

data:{labels:holdLabels,datasets:[{data:holdValues}]},

options:{

plugins:{legend:{display:false}},

onClick:(evt,elements)=>{

if(elements.length>0){

const index=elements[0].index

const seleccionado=holdLabels[index]

filtroHold=(filtroHold===seleccionado)?null:seleccionado

aplicarFiltros()

}

}

}

})

}


document.addEventListener("input",aplicarFiltros)
document.addEventListener("change",aplicarFiltros)

window.onload=function(){

if(window.csvData){

procesarCSV(window.csvData)

}

}

</script>

</body>
</html>
