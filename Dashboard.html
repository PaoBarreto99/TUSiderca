<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f6fa;
padding:20px
}

.container{
max-width:1500px;
margin:auto
}

.header{
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
padding:25px;
border-radius:12px;
margin-bottom:25px;
text-align:center
}

.subtitulo{
margin-top:10px;
font-size:14px;
line-height:1.6
}

.subtitulo a{
color:white;
text-decoration:underline
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px
}

.stat-card{
color:white;
padding:20px;
border-radius:12px;
text-align:center
}

.bg-purple{background:linear-gradient(135deg,#6a11cb,#2575fc)}
.bg-red{background:linear-gradient(135deg,#cb2d3e,#ef473a)}

.number{
font-size:2em;
font-weight:bold
}

.subtext{
font-size:13px;
margin-top:5px
}

.charts-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px
}

.chart-container{
background:white;
padding:15px;
border-radius:12px;
height:250px
}

.chart-container canvas{
height:200px !important
}

table{
width:100%;
border-collapse:collapse;
background:white
}

thead{
background:#6a11cb;
color:white
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px
}

.estado-vigente{color:green;font-weight:bold}
.estado-vencida{color:red;font-weight:bold}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Mínimos Requeridos VENCIDOS</h1>

<p class="subtitulo">

<a href="https://pwbi.tenaris.net" target="_blank">
¿Cómo lo regularizo?
</a>

<br>

Actualizado hasta el 06-Mar

</p>

</div>

<div class="stats-grid">

<div class="stat-card bg-purple">
<h3>CUMPLIMIENTO 93%</h3>
<div class="subtext">Target: 100%</div>
</div>

<div class="stat-card bg-red">
<h3>Requisitos vencidos</h3>
<div class="number" id="pendientes">0</div>
</div>

</div>

<div class="charts-grid">

<div class="chart-container">
<h3>Pendientes por OU 4</h3>
<canvas id="ouChart"></canvas>
</div>

<div class="chart-container">
<h3>On Hold</h3>
<canvas id="holdChart"></canvas>
</div>

</div>

<table>

<thead>
<tr>
<th>SAP ID</th>
<th>Nombre y Apellido</th>
<th>Certificación</th>
<th>Activity Type</th>
<th>Supervisor</th>
<th>OU 4</th>
<th>Estado</th>
<th>Comentarios</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

let datosGlobal=[]
let ouChart
let holdChart

function procesarCSV(csv){

Papa.parse(csv,{
header:true,
skipEmptyLines:true,
complete:function(results){

datosGlobal=results.data
renderizar(datosGlobal)

}
})

}

function parseFecha(f){

if(!f) return null

const p=f.split("/")

// FORMATO ARGENTINO DD/MM/YYYY

return new Date(p[2],p[1]-1,p[0])

}

function estado(f){

const fecha=parseFecha(f)

if(!fecha) return "Vencida"

const hoy=new Date()

hoy.setHours(0,0,0,0)

if(fecha<hoy) return "Vencida"

return "Vigente"

}

function renderizar(datos){

let vencidas=0

let ouCount={}
let holdCount={}

const tbody=document.getElementById("tableBody")

tbody.innerHTML=""

datos.forEach(d=>{

const est=estado(d["Fecha_vencimiento"])

if(est==="Vencida"){

vencidas++

const ou=d["OU 4"]||"Sin OU"

ouCount[ou]=(ouCount[ou]||0)+1

}

if(d.Comentarios){

holdCount[d.Comentarios]=(holdCount[d.Comentarios]||0)+1

}

tbody.innerHTML+=`
<tr>
<td>${d["SAP ID"]||""}</td>
<td>${d.Nombre||""}</td>
<td>${d.Certificacion||""}</td>
<td>${d["Activity Type"]||""}</td>
<td>${d.Supervisor||""}</td>
<td>${d["OU 4"]||""}</td>
<td class="${est==="Vencida"?"estado-vencida":"estado-vigente"}">${est}</td>
<td>${d.Comentarios||""}</td>
</tr>
`

})

document.getElementById("pendientes").textContent=vencidas

crearGraficos(ouCount,holdCount)

}

function crearGraficos(ouCount,holdCount){

const sortedOU=Object.entries(ouCount).sort((a,b)=>b[1]-a[1])

const ouLabels=sortedOU.map(e=>e[0])
const ouValues=sortedOU.map(e=>e[1])

const colors=ouValues.map((v,i)=> i<3 ? "#ef473a" : "#f7971e")

if(ouChart) ouChart.destroy()

ouChart=new Chart(document.getElementById("ouChart"),{

type:"bar",

data:{
labels:ouLabels,
datasets:[{
data:ouValues,
backgroundColor:colors,
barThickness:12
}]
},

options:{
indexAxis:'y',
plugins:{legend:{display:false}},
scales:{y:{ticks:{autoSkip:false}}}
}

})


const sortedHold=Object.entries(holdCount).sort((a,b)=>b[1]-a[1])

const holdLabels=sortedHold.map(e=>e[0])
const holdValues=sortedHold.map(e=>e[1])

if(holdChart) holdChart.destroy()

holdChart=new Chart(document.getElementById("holdChart"),{

type:"bar",

data:{
labels:holdLabels,
datasets:[{
data:holdValues,
backgroundColor:"#6a11cb",
barThickness:20
}]
},

options:{
plugins:{legend:{display:false}},
scales:{x:{ticks:{autoSkip:false}}}
}

})

}

window.onload=function(){

if(window.csvData){

procesarCSV(window.csvData)

}

}

</script>

</body>

</html>
