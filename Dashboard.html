<script>
function crearGraficos(ouCount,holdCount){

const sortedOU=Object.entries(ouCount).sort((a,b)=>b[1]-a[1]);
const ouLabels=sortedOU.map(e=>e[0]);
const ouValues=sortedOU.map(e=>e[1]);

// 🔥 ALTURA DINÁMICA SEGÚN CANTIDAD DE OU
const ouCanvas = document.getElementById("ouChart");
const alturaBase = 40; // espacio por fila
const alturaMinima = 450;

ouCanvas.parentElement.style.height =
Math.max(alturaMinima, ouLabels.length * alturaBase) + "px";

// 🔥 COLORES: primeras 3 en rojo
const coloresOU = ouValues.map((v,i)=>{
if(i < 3){
return "#ef473a"; // rojo
}
return "#6a11cb"; // violeta original
});

if(ouChart) ouChart.destroy();
ouChart=new Chart(ouCanvas,{
type:"bar",
data:{
labels:ouLabels,
datasets:[{
data:ouValues,
backgroundColor:coloresOU
}]
},
options:{
indexAxis:'y',
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{
y:{
ticks:{
autoSkip:false // 🔥 mostrar todas las OU
}
}
},
onClick:(evt,elements)=>{
if(elements.length>0){
const index=elements[0].index;
const seleccionado=ouLabels[index];
filtroOU = (filtroOU===seleccionado) ? null : seleccionado;
aplicarFiltros();
}
}
}
});

const sortedHold=Object.entries(holdCount).sort((a,b)=>b[1]-a[1]);
const holdLabels=sortedHold.map(e=>e[0]);
const holdValues=sortedHold.map(e=>e[1]);

if(holdChart) holdChart.destroy();
holdChart=new Chart(document.getElementById("holdChart"),{
type:"bar",
data:{
labels:holdLabels,
datasets:[{
data:holdValues
}]
},
options:{
maintainAspectRatio:false,
plugins:{legend:{display:false}},
onClick:(evt,elements)=>{
if(elements.length>0){
const index=elements[0].index;
const seleccionado=holdLabels[index];
filtroHold = (filtroHold===seleccionado) ? null : seleccionado;
aplicarFiltros();
}
}
}
});
}
</script>
