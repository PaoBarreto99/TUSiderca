<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
background:#f4f6fa;
padding:20px;
}

.container{
max-width:1600px;
margin:auto;
}

/* 🔥 HEADER VIOLETA */
.header{
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:white;
padding:30px;
text-align:center;
border-radius:15px;
margin-bottom:25px;
}

.header h1{
font-size:2em;
}

.filters{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:25px;
display:flex;
gap:15px;
flex-wrap:wrap;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.filters input,.filters select{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

.filters button{
padding:8px 15px;
border:none;
border-radius:8px;
background:#667eea;
color:white;
cursor:pointer;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:white;
padding:20px;
border-radius:12px;
text-align:center;
}

.stat-card .number{
font-size:2em;
font-weight:bold;
}

.charts-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px;
}

.chart-container{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

thead{
background:#667eea;
color:white;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px;
}

tbody tr:hover{
background:#f5f5f5;
}

.table-container{
overflow-x:auto;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}
</style>
</head>

<body>
<div class="container">

<div class="filters">
<input type="text" id="filtroNombre" placeholder="Apellido y Nombre">
<input type="text" id="filtroSAP" placeholder="SAP ID">

<select id="filtroActivity">
<option value="">Activity Type</option>
</select>

<select id="filtroCertType">
<option value="">Certification Type</option>
</select>

<button onclick="resetTotal()">Reset</button>
</div>

<div class="stats-grid">
<div class="stat-card"><h3>Vigentes</h3><div class="number" id="vigentes">0</div></div>
<div class="stat-card"><h3>Por Vencer</h3><div class="number" id="porVencer">0</div></div>
<div class="stat-card"><h3>Vencidas</h3><div class="number" id="vencidas">0</div></div>
<div class="stat-card"><h3>Total</h3><div class="number" id="total">0</div></div>
</div>

<div class="charts-grid">
<div class="chart-container">
<h3>Pendientes por OU 4</h3>
<canvas id="ouChart"></canvas>
</div>
<div class="chart-container">
<h3>Certificaciones On Hold</h3>
<canvas id="holdChart"></canvas>
</div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Apellido y Nombre</th>
<th>SAP ID</th>
<th>Certification Type</th>
<th>Certificacion</th>
<th>Activity Type</th>
<th>OU 4</th>
<th>Fecha Vencimiento</th>
<th>Estado</th>
<th>Comentarios</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>
let datosGlobal=[];
let ouChart,holdChart;
let filtroGrafico=null;

function procesarCSV(csv){
Papa.parse(csv,{
header:true,
skipEmptyLines:true,
complete:function(results){
datosGlobal=results.data;
cargarOpciones();
renderizar(datosGlobal);
}
});
}

function cargarOpciones(){
const actSet=new Set();
const certSet=new Set();

datosGlobal.forEach(d=>{
if(d["Activity Type"]) actSet.add(d["Activity Type"]);
if(d["Certification Type"]) certSet.add(d["Certification Type"]);
});

actSet.forEach(a=>{
document.getElementById("filtroActivity").innerHTML+=`<option>${a}</option>`;
});
certSet.forEach(c=>{
document.getElementById("filtroCertType").innerHTML+=`<option>${c}</option>`;
});
}

function estado(f){
const fecha=new Date(f);
if(isNaN(fecha)) return "Vencida";
const hoy=new Date();
const dias=(fecha-hoy)/(1000*60*60*24);
if(dias<0) return "Vencida";
if(dias<=90) return "Por Vencer";
return "Vigente";
}

function aplicarFiltros(){
if(filtroGrafico) return;

const nombre=document.getElementById("filtroNombre").value.toLowerCase();
const sap=document.getElementById("filtroSAP").value.toLowerCase();
const act=document.getElementById("filtroActivity").value;
const cert=document.getElementById("filtroCertType").value;

const filtrados=datosGlobal.filter(d=>{
return (!nombre|| (d.Nombre||"").toLowerCase().includes(nombre))
&&(!sap||(d["SAP ID"]||"").toLowerCase().includes(sap))
&&(!act||d["Activity Type"]===act)
&&(!cert||d["Certification Type"]===cert);
});

renderizar(filtrados);
}

function resetTotal(){
filtroGrafico=null;
document.getElementById("filtroNombre").value="";
document.getElementById("filtroSAP").value="";
document.getElementById("filtroActivity").value="";
document.getElementById("filtroCertType").value="";
renderizar(datosGlobal);
}

function renderizar(datos){

let vig=0,pv=0,ven=0;
let ouCount={},holdCount={};
const tbody=document.getElementById("tableBody");
tbody.innerHTML="";

datos.forEach(d=>{
const est=estado(d["Fecha_Vencimiento"]);

if(est==="Vigente")vig++;
if(est==="Por Vencer")pv++;
if(est==="Vencida")ven++;

if(est!=="Vigente"){
const ou=d["OU 4"]||"Sin OU";
ouCount[ou]=(ouCount[ou]||0)+1;
}

if(d.Comentarios){
holdCount[d.Comentarios]=(holdCount[d.Comentarios]||0)+1;
}

tbody.innerHTML+=`
<tr>
<td>${d.Nombre||""}</td>
<td>${d["SAP ID"]||""}</td>
<td>${d["Certification Type"]||""}</td>
<td>${d.Certificacion||""}</td>
<td>${d["Activity Type"]||""}</td>
<td>${d["OU 4"]||""}</td>
<td>${d["Fecha_Vencimiento"]||""}</td>
<td>${est}</td>
<td>${d.Comentarios||""}</td>
</tr>`;
});

document.getElementById("vigentes").textContent=vig;
document.getElementById("porVencer").textContent=pv;
document.getElementById("vencidas").textContent=ven;
document.getElementById("total").textContent=datos.length;

/* ORDENAR OU */
const sortedOU=Object.entries(ouCount).sort((a,b)=>b[1]-a[1]);
const ouLabels=sortedOU.map(e=>e[0]);
const ouValues=sortedOU.map(e=>e[1]);

if(ouChart) ouChart.destroy();

ouChart=new Chart(document.getElementById("ouChart"),{
type:"bar",
data:{labels:ouLabels,datasets:[{data:ouValues}]},
options:{
indexAxis:'y',
onClick:(evt,elements)=>{
if(elements.length>0){
const ou=ouLabels[elements[0].index];
if(filtroGrafico===ou){
filtroGrafico=null;
renderizar(datosGlobal);
}else{
filtroGrafico=ou;
renderizar(datosGlobal.filter(d=>d["OU 4"]===ou));
}
}
}
}
});

/* ORDENAR HOLD */
const sortedHold=Object.entries(holdCount).sort((a,b)=>b[1]-a[1]);
const holdLabels=sortedHold.map(e=>e[0]);
const holdValues=sortedHold.map(e=>e[1]);

if(holdChart) holdChart.destroy();

holdChart=new Chart(document.getElementById("holdChart"),{
type:"bar",
data:{labels:holdLabels,datasets:[{data:holdValues}]},
options:{
indexAxis:'y',
onClick:(evt,elements)=>{
if(elements.length>0){
const hold=holdLabels[elements[0].index];
if(filtroGrafico===hold){
filtroGrafico=null;
renderizar(datosGlobal);
}else{
filtroGrafico=hold;
renderizar(datosGlobal.filter(d=>d.Comentarios===hold));
}
}
}
}
});

}

document.addEventListener("input", aplicarFiltros);
document.addEventListener("change", aplicarFiltros);

window.onload=function(){
if(window.csvData){
procesarCSV(window.csvData);
}
}
</script>

</body>
</html>
