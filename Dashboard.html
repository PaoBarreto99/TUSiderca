<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f6fa;
padding:20px
}

.container{
max-width:1500px;
margin:auto
}

.header{
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
padding:25px;
border-radius:12px;
margin-bottom:25px;
text-align:center
}

.subtitulo{
margin-top:8px;
font-size:14px;
opacity:0.9
}

.filters{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:25px;
display:flex;
gap:10px;
flex-wrap:wrap
}

.filters input,.filters select{
padding:8px;
border-radius:8px;
border:1px solid #ccc
}

.filters button{
padding:8px 15px;
border:none;
border-radius:8px;
background:#6a11cb;
color:white;
cursor:pointer
}

.stats-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px
}

.stat-card{
color:white;
padding:20px;
border-radius:12px;
text-align:center
}

.bg-purple{background:linear-gradient(135deg,#6a11cb,#2575fc)}
.bg-red{background:linear-gradient(135deg,#cb2d3e,#ef473a)}

.number{
font-size:2em;
font-weight:bold
}

.subcard{
font-size:13px;
opacity:0.9;
margin-top:5px
}

.charts-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:30px
}

.chart-container{
background:white;
padding:15px;
border-radius:12px;
height:240px
}

.chart-container canvas{
height:180px !important
}

table{
width:100%;
border-collapse:collapse;
background:white
}

thead{
background:#6a11cb;
color:white
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px
}

.estado-vigente{color:green;font-weight:bold}
.estado-vencida{color:red;font-weight:bold}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>Mínimos Requeridos VENCIDOS</h1>
<div class="subtitulo">
¿Cómo lo regularizo?<br>
Actualizado hasta el 06-Mar
</div>
</div>

<div class="filters">

<input id="fNombre" placeholder="Nombre">
<input id="fSAP" placeholder="SAP ID">

<select id="fActivity">
<option value="">Activity Type</option>
</select>

<select id="fSupervisor">
<option value="">Supervisor</option>
</select>

<select id="fOU5">
<option value="">OU 5</option>
</select>

<button onclick="resetFiltros()">Reset</button>
<button onclick="exportarExcel()">Exportar Excel</button>

</div>

<div class="stats-grid">

<div class="stat-card bg-purple">
<h3>CUMPLIMIENTO 93%</h3>
<div class="subcard">Target 100%</div>
</div>

<div class="stat-card bg-red">
<h3>Requisitos vencidos</h3>
<div class="number" id="pendientes">0</div>
</div>

</div>

<div class="charts-grid">

<div class="chart-container">
<h3>Pendientes por OU 4</h3>
<canvas id="ouChart"></canvas>
</div>

<div class="chart-container">
<h3>On Hold</h3>
<canvas id="holdChart"></canvas>
</div>

</div>

<table>

<thead>
<tr>
<th>SAP ID</th>
<th>Nombre</th>
<th>Certificación</th>
<th>Activity Type</th>
<th>Supervisor</th>
<th>OU 4</th>
<th>Estado</th>
<th>Comentarios</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

let datosGlobal=[]
let datosFiltrados=[]

let ouChart
let holdChart

function procesarCSV(csv){

Papa.parse(csv,{
header:true,
skipEmptyLines:true,
complete:function(results){

datosGlobal = results.data

cargarFiltros()

aplicarFiltros()

}
})

}

function cargarFiltros(){

const actSet=new Set()
const supSet=new Set()
const ou5Set=new Set()

datosGlobal.forEach(d=>{

if(d["Activity Type"]) actSet.add(d["Activity Type"])
if(d["Supervisor"]) supSet.add(d["Supervisor"])
if(d["OU 5"]) ou5Set.add(d["OU 5"])

})

actSet.forEach(v=>{
fActivity.innerHTML+=`<option>${v}</option>`
})

supSet.forEach(v=>{
fSupervisor.innerHTML+=`<option>${v}</option>`
})

ou5Set.forEach(v=>{
fOU5.innerHTML+=`<option>${v}</option>`
})

}

function parseFecha(f){

if(!f) return null

const p=f.split("/")

return new Date(p[2],p[1]-1,p[0])

}

function estado(f){

const fecha=parseFecha(f)

if(!fecha) return "Vencida"

const hoy=new Date()
hoy.setHours(0,0,0,0)

if(fecha<hoy) return "Vencida"

return "Vigente"

}

function aplicarFiltros(){

const nombre=fNombre.value.toLowerCase()
const sap=fSAP.value
const act=fActivity.value
const sup=fSupervisor.value
const ou5=fOU5.value

datosFiltrados = datosGlobal.filter(d=>{

return (!nombre || (d["Nombre"]||"").toLowerCase().includes(nombre))
&&(!sap || (d["SAP ID"]||"").includes(sap))
&&(!act || d["Activity Type"]===act)
&&(!sup || d["Supervisor"]===sup)
&&(!ou5 || d["OU 5"]===ou5)

})

renderizar()

}

function resetFiltros(){

document.querySelectorAll("input").forEach(e=>e.value="")
document.querySelectorAll("select").forEach(e=>e.value="")

aplicarFiltros()

}

function exportarExcel(){

const ws=XLSX.utils.json_to_sheet(datosFiltrados)
const wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Reporte")

XLSX.writeFile(wb,"Minimos_Requeridos.xlsx")

}

function renderizar(){

let vencidas=0
let ouCount={}
let holdCount={}

const tbody=document.getElementById("tableBody")
tbody.innerHTML=""

datosFiltrados.forEach(d=>{

const est=estado(d["Fecha_vencimiento"])

if(est==="Vencida"){

vencidas++

const ou=d["OU 4"]||"Sin OU"

ouCount[ou]=(ouCount[ou]||0)+1

}

if(d["Comentarios"]){

holdCount[d["Comentarios"]] = (holdCount[d["Comentarios"]]||0)+1

}

tbody.innerHTML+=`
<tr>
<td>${d["SAP ID"]||""}</td>
<td>${d["Nombre"]||""}</td>
<td>${d["Certificacion"]||""}</td>
<td>${d["Activity Type"]||""}</td>
<td>${d["Supervisor"]||""}</td>
<td>${d["OU 4"]||""}</td>
<td class="${est==="Vencida"?"estado-vencida":"estado-vigente"}">${est}</td>
<td>${d["Comentarios"]||""}</td>
</tr>
`

})

pendientes.textContent=vencidas

crearGraficos(ouCount,holdCount)

}

function crearGraficos(ouCount,holdCount){

const ouLabels=Object.keys(ouCount)
const ouValues=Object.values(ouCount)

const colors=ouValues.map((v,i)=> i<3 ? "#ef473a" : "#f7971e")

if(ouChart) ouChart.destroy()

ouChart=new Chart(ouChart=document.getElementById("ouChart"),{

type:"bar",

data:{
labels:ouLabels,
datasets:[{
data:ouValues,
backgroundColor:colors
}]
},

options:{
indexAxis:'y',
plugins:{legend:{display:false}}
}

})

const hLabels=Object.keys(holdCount)
const hValues=Object.values(holdCount)

if(holdChart) holdChart.destroy()

holdChart=new Chart(document.getElementById("holdChart"),{

type:"bar",

data:{
labels:hLabels,
datasets:[{
data:hValues,
backgroundColor:"#6a11cb"
}]
},

options:{
plugins:{legend:{display:false}}
}

})

}

document.addEventListener("input",aplicarFiltros)
document.addEventListener("change",aplicarFiltros)

window.onload=function(){

if(window.csvData){

procesarCSV(window.csvData)

}

}

</script>

</body>
</html>
